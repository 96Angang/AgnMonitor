[agent]
  interval = "2s"
  flush_interval = "2s"
  hostname = ""
  omit_hostname = false

[[inputs.cpu]]
[[inputs.mem]]
[[inputs.disk]]
[[inputs.diskio]]
[[inputs.net]]

[[inputs.tail]]
  files = ["/etc/httpd/logs/access_log", "/etc/httpd/logs/error_log"]
  from_beginning = false
  pipe = false
  data_format = "value"
  data_type = "string"
  name_override = "custom_logs"

[[inputs.exec]]
  commands = ["/usr/bin/curl -s -m 5 https://api.ipify.org"]
  name_override = "public_ip"
  data_format = "value"
  data_type = "string"
  interval = "5m"

[[outputs.http]]
  # AgnMonitor 수집 서버 주소로 변경하세요 (예: http://<MONITOR_HOST>:18080/api/collect/)
  url = "http://MONITOR_HOST:18080/api/collect/"
  method = "POST"
  data_format = "json"

[[outputs.prometheus_client]]
  listen = ":9126"
  path = "/metrics"
  expiration_interval = "0s"
  string_as_label = true

[[processors.defaults]]
  namepass = ["public_ip"]
  [processors.defaults.fields]
    status = 1